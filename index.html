<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SocialHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
        <div id="app">
      <nav id="navbar" class="navbar hidden">
        <div class="nav-brand">
          <span class="brand-icon">◈</span>
          <span class="brand-name">SocialHub</span>
        </div>
        <div class="nav-links">
          <a href="#" id="nav-feed" class="nav-link active">Feed</a>
          <a href="#" id="nav-profile" class="nav-link">Profile</a>
        </div>
        <div class="nav-actions">
          <button id="btn-new-post" class="btn btn-primary btn-sm">+ New Post</button>
          <button id="btn-logout" class="btn btn-ghost btn-sm">Sign out</button>
        </div>
      </nav>
       
      <main id="main-content">
      </main>

       <div id="modal-post" class="modal hidden">
      <div class="modal-overlay"></div>
      <div class="modal-box">
        <div class="modal-header">
          <h2 id="modal-post-title">New Post</h2>
          <button class="modal-close" id="modal-close-btn">✕</button>
        </div>
        <form id="post-form" class="post-form">
          <div class="form-group">
            <label for="post-title">Title <span class="required">*</span></label>
            <input type="text" id="post-title" placeholder="What's on your mind?" required />
          </div>
          <div class="form-group">
            <label for="post-body">Body</label>
            <textarea id="post-body" rows="4" placeholder="Share your thoughts..."></textarea>
          </div>
          <div class="form-group">
            <label for="post-tags">Tags <span class="hint">(comma separated)</span></label>
            <input type="text" id="post-tags" placeholder="travel, tech, life" />
          </div>
          <div class="form-group">
            <label for="post-media">Media URL</label>
            <input type="url" id="post-media" placeholder="https://example.com/image.jpg" />
          </div>
          <div class="form-actions">
            <button type="button" id="cancel-post-btn" class="btn btn-ghost">Cancel</button>
            <button type="submit" id="submit-post-btn" class="btn btn-primary">Publish</button>
          </div>
        </form>
      </div>
    </div>
    
        <div id="modal-comment" class="modal hidden">
      <div class="modal-overlay"></div>
      <div class="modal-box modal-box--sm">
        <div class="modal-header">
          <h2>Add a Comment</h2>
          <button class="modal-close" id="comment-modal-close">✕</button>
        </div>
        <form id="comment-form">
          <div class="form-group">
            <textarea id="comment-body" rows="3" placeholder="Write your comment..." required></textarea>
          </div>
          <div class="form-actions">
            <button type="button" id="cancel-comment-btn" class="btn btn-ghost">Cancel</button>
            <button type="submit" class="btn btn-primary">Comment</button>
          </div>
        </form>
      </div>
    </div>
    
    </div>
    </body>
</html>
